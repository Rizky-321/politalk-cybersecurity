<!doctype html>

<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Lupa Password - Politalk</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <body class="bg-slate-100 min-h-screen">
    <!-- Logo -->

    <div class="absolute top-8 left-10">
      <h1 class="text-4xl font-bold text-blue-600">POLITALK</h1>
    </div>

    <div class="min-h-screen flex items-center justify-center p-6">
      ```
      <div
        class="w-full max-w-5xl bg-white rounded-3xl overflow-hidden shadow-2xl flex"
      >
        <!-- LEFT -->
        <div
          class="hidden md:flex md:w-2/5 bg-blue-600 text-white p-10 flex-col justify-center"
        >
          <h1 class="text-5xl font-bold mb-5">Lupa Password?</h1>

          <p class="text-blue-100 leading-8">
            Jangan khawatir. Masukkan email dan NIM yang terdaftar untuk
            memverifikasi akun Anda sebelum membuat password baru.
          </p>

          <div class="mt-10 text-7xl">🔐</div>
        </div>

        <!-- RIGHT -->
        <div class="w-full md:w-3/5 p-10">
          <h2 class="text-4xl font-bold text-slate-800">Verifikasi Akun</h2>

          <p class="text-slate-500 mt-2 mb-8">Masukkan email dan NIM Anda</p>

          <!-- EMAIL -->
          <div class="mb-5">
            <label class="block mb-2 font-medium text-slate-700"> Email </label>

            <input
              id="email"
              type="email"
              placeholder="contoh@email.com"
              class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <!-- NIM -->
          <div class="mb-5">
            <label class="block mb-2 font-medium text-slate-700"> NIM </label>

            <input
              id="nim"
              type="text"
              placeholder="Masukkan NIM"
              class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <!-- BUTTON -->
          <button
            onclick="verifyUser()"
            class="w-full bg-blue-600 hover:bg-blue-700 hover:scale-[1.01] duration-200 text-white py-3 rounded-xl font-semibold shadow-lg"
          >
            Verifikasi Akun
          </button>

          <!-- BACK -->
          <div class="text-center mt-6">
            <a
              href="index.html"
              class="text-blue-600 hover:text-blue-800 font-medium"
            >
              ← Kembali ke Login
            </a>
          </div>

          <!-- FOOTER -->
          <div class="text-center mt-8">
            <p class="text-slate-400 text-sm">Politalk © 2026</p>
          </div>
        </div>
      </div>
      ```
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="script.js"></script>
  </body>
</html>
