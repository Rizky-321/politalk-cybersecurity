<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Politalk - Forum Mahasiswa Polibatam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #f8faff;
      }
    </style>
  </head>
  <body class="text-slate-800">
    <nav
      class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-blue-100 shadow-sm"
    >
      <div
        class="max-w-[95rem] mx-auto px-4 min-h-16 py-3 flex items-center gap-4"
      >
        <div class="flex items-center gap-5">
          <a href="feed.html" class="hover:opacity-80 transition">
            <h1 class="text-2xl font-extrabold text-blue-700 tracking-tighter">
              POLITALK
            </h1>
          </a>
          <div class="hidden lg:flex items-center gap-1">
            <button
              class="px-3 py-2 rounded-xl text-xs font-bold text-blue-700 bg-blue-50"
            >
              Home
            </button>
            <button
              class="px-3 py-2 rounded-xl text-xs font-bold text-slate-500"
            >
              Kategori
            </button>
            <button
              class="px-3 py-2 rounded-xl text-xs font-bold text-slate-500"
            >
              PBL
            </button>
            <button
              class="px-3 py-2 rounded-xl text-xs font-bold text-slate-500"
            >
              Organisasi
            </button>
            <a
              id="admin-menu"
              href="admin-users.html"
              class="hidden px-3 py-2 rounded-xl text-xs font-bold text-slate-500"
            >
              Kelola User
            </a>
          </div>
        </div>
        <div class="relative flex-1 max-w-xl hidden md:block mx-4">
          <input
            id="global-search"
            type="search"
            placeholder="Cari topik..."
            class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-4 py-2 text-sm outline-none"
          />
        </div>
        <div class="ml-auto flex items-center gap-3">
          <a
            href="profile.html"
            id="header-profile-avatar"
            class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xs shadow-md shadow-blue-100"
          >
          </a>

          <button
            onclick="confirmLogout()"
            class="font-medium text-slate-600 hover:text-red-500"
          >
            Logout
          </button>
        </div>
      </div>
    </nav>

    <div
      class="max-w-[95rem] mx-auto px-4 lg:px-6 grid grid-cols-1 lg:grid-cols-[16rem_minmax(0,1fr)_19rem] gap-6 mt-6 pb-12"
    >
      <aside class="hidden lg:block space-y-5">
        <div
          class="bg-white rounded-3xl p-5 border border-blue-50 shadow-sm relative overflow-hidden text-center"
        >
          <div class="absolute top-0 left-0 w-full h-12 bg-blue-600"></div>
          <div class="relative pt-4">
            <div
              class="w-16 h-16 bg-white p-1 rounded-2xl shadow-sm mx-auto mb-3"
            >
              <div
                class="w-full h-full bg-slate-100 rounded-xl flex items-center justify-center text-xl"
              >
                👤
              </div>
            </div>
            <h3 id="sidebar-user-name" class="font-bold text-slate-800 text-sm">
              Loading...
            </h3>

            <p
              id="sidebar-user-nim"
              class="text-[10px] text-slate-400 font-bold mb-4"
            >
              Loading...
            </p>
            <div
              class="grid grid-cols-2 gap-4 w-full border-t border-slate-50 pt-4"
            >
              <div>
                <p
                  id="user-post-count"
                  class="text-xs font-extrabold text-blue-600"
                >
                  0
                </p>
                <p class="text-[8px] text-slate-400 font-bold uppercase">
                  Diskusi
                </p>
              </div>
              <div>
                <p class="text-xs font-extrabold text-blue-600">Polibatam</p>
                <p class="text-[8px] text-slate-400 font-bold uppercase">
                  Kampus
                </p>
              </div>
            </div>
          </div>
        </div>
        <div class="bg-white rounded-3xl p-5 border border-blue-50 shadow-sm">
          <p
            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4"
          >
            Organisasi Polibatam
          </p>
          <div class="space-y-3">
            <div class="flex items-center gap-3 p-2 bg-blue-50 rounded-xl">
              <span class="text-[10px] font-bold text-blue-700">BEM</span
              ><span class="text-xs font-bold">BEM Polibatam</span>
            </div>
            <div
              class="flex items-center gap-3 p-2 hover:bg-slate-50 rounded-xl"
            >
              <span class="text-[10px] font-bold text-slate-500">IF</span
              ><span class="text-xs font-bold">HMIF (Informatika)</span>
            </div>
          </div>
        </div>
      </aside>
      <section class="space-y-5">
        <div
          data-feed-input
          class="bg-white p-4 rounded-3xl border border-blue-100 shadow-sm cursor-pointer"
          onclick="openModal()"
        >
          <div class="flex items-center gap-4">
            <div
              class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white"
            >
              💬
            </div>

            <div
              class="flex-1 bg-slate-50 rounded-xl px-4 py-2.5 text-sm text-slate-400"
            >
              Share info seputar Polibatam...
            </div>
          </div>
        </div>

        <main id="feed-container" class="space-y-5"></main>
      </section>

      <aside class="hidden lg:block space-y-6">
        <div class="bg-white rounded-3xl p-5 border border-blue-50 shadow-sm">
          <p
            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4"
          >
            Trending di Kampus
          </p>
          <div
            class="p-2 bg-blue-50 rounded-xl font-bold text-blue-700 text-xs"
          >
            #PBL2026
          </div>
        </div>
      </aside>
    </div>

    <div
      id="createPostModal"
      class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4"
    >
      <div
        class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"
        onclick="closeModal()"
      ></div>
      <div
        class="relative bg-white w-full max-w-lg rounded-[2rem] shadow-2xl p-8"
      >
        <h3 class="text-xl font-extrabold text-slate-800 mb-6">
          Buat Postingan
        </h3>
        <div class="space-y-4">
          <input
            id="post-title"
            type="text"
            placeholder="Judul..."
            class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-slate-200 focus:border-blue-400"
          />
          <textarea
            id="post-content"
            rows="4"
            placeholder="Apa yang ingin dibahas?"
            class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-slate-200 focus:border-blue-400"
          ></textarea>
          <input
            id="post-image"
            type="file"
            accept="image/*"
            class="w-full text-xs text-slate-500"
          />
          <button
            onclick="submitPost()"
            class="w-full bg-blue-600 text-white font-extrabold py-4 rounded-2xl"
          >
            Terbitkan
          </button>
        </div>
      </div>
    </div>
    <div
      id="editPostModal"
      class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4"
    >
      <div
        class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"
        onclick="closeEditPostModal()"
      ></div>

      <div
        class="relative bg-white w-full max-w-lg rounded-[2rem] shadow-2xl p-8"
      >
        <h3 class="text-xl font-extrabold text-slate-800 mb-6">
          Edit Postingan
        </h3>

        <div class="space-y-4">
          <input
            id="edit-post-title"
            type="text"
            placeholder="Judul..."
            class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-slate-200"
          />

          <textarea
            id="edit-post-content"
            rows="4"
            placeholder="Isi postingan..."
            class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-slate-200"
          ></textarea>

          <button
            onclick="savePostEdit()"
            class="w-full bg-blue-600 text-white font-extrabold py-4 rounded-2xl"
          >
            Simpan Perubahan
          </button>
        </div>
      </div>
    </div>
    <div
      id="editCommentModal"
      class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4"
    >
      <div
        class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"
        onclick="closeEditCommentModal()"
      ></div>

      <div
        class="relative bg-white w-full max-w-lg rounded-[2rem] shadow-2xl p-8"
      >
        <h3 class="text-xl font-extrabold mb-6">Edit Komentar</h3>

        <textarea
          id="edit-comment-content"
          rows="4"
          class="w-full p-4 bg-slate-50 rounded-2xl mb-4"
        ></textarea>

        <button
          onclick="saveCommentEdit()"
          class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl"
        >
          Simpan Perubahan
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
