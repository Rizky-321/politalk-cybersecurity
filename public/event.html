<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Event Kampus</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-slate-100 min-h-screen">
    <!-- HERO -->
    <div class="max-w-6xl mx-auto px-6 pt-8">
      <div
        class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-3xl p-8 text-white shadow-xl mb-8"
      >
        <div class="flex justify-between items-center">
          <div>
            <h1 class="text-5xl font-bold">📅 Event Kampus</h1>

            <p class="mt-3 text-blue-100 text-lg">
              Temukan seminar, workshop, kompetisi dan kegiatan kampus lainnya.
            </p>
          </div>

          <button
            onclick="openCreateEventModal()"
            class="bg-white text-blue-700 px-8 py-4 rounded-2xl font-semibold shadow-lg hover:scale-105 transition"
          >
            + Buat Event
          </button>
        </div>
      </div>

      <!-- LIST EVENT -->
      <div id="event-container" class="flex flex-col gap-6"></div>
    </div>

    <!-- MODAL -->
    <div
      id="createEventModal"
      class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4"
    >
      <div
        class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl max-h-[90vh] overflow-y-auto p-8"
      >
        <h2 class="text-3xl font-bold mb-6">Buat Event Baru</h2>

        <!-- Judul -->
        <input
          id="eventTitle"
          type="text"
          placeholder="Judul Event"
          class="w-full border border-slate-300 p-4 rounded-2xl mb-4"
        />

        <!-- Deskripsi -->
        <textarea
          id="eventDescription"
          rows="4"
          placeholder="Deskripsi Event"
          class="w-full border border-slate-300 p-4 rounded-2xl mb-4"
        ></textarea>

        <!-- Kategori -->
        <select
          id="eventCategory"
          class="w-full border border-slate-300 p-4 rounded-2xl mb-4"
        >
          <option value="">Pilih Kategori</option>
          <option value="Seminar">Seminar</option>
          <option value="Workshop">Workshop</option>
          <option value="Kompetisi">Kompetisi</option>
          <option value="Olahraga">Olahraga</option>
        </select>

        <!-- Tanggal -->
        <input
          id="eventDate"
          type="date"
          class="w-full border border-slate-300 p-4 rounded-2xl mb-4"
        />

        <!-- Jam -->
        <div class="grid grid-cols-2 gap-4 mb-4">
          <input
            id="eventStartTime"
            type="time"
            class="border border-slate-300 p-4 rounded-2xl"
          />

          <input
            id="eventEndTime"
            type="time"
            class="border border-slate-300 p-4 rounded-2xl"
          />
        </div>

        <!-- Lokasi -->
        <input
          id="eventLocation"
          type="text"
          placeholder="Lokasi Event"
          class="w-full border border-slate-300 p-4 rounded-2xl mb-4"
        />

        <!-- Upload -->
        <label class="block font-semibold mb-2"> Poster Event </label>

        <input
          id="eventImage"
          type="file"
          accept="image/*"
          class="w-full border border-slate-300 p-3 rounded-2xl mb-4"
        />

        <!-- Preview -->
        <img
          id="eventPreview"
          class="hidden w-full h-64 object-cover rounded-2xl shadow mb-6"
        />

        <!-- Footer -->
        <div class="flex justify-end gap-3">
          <button
            onclick="closeCreateEventModal()"
            class="px-6 py-3 bg-slate-200 rounded-xl hover:bg-slate-300"
          >
            Batal
          </button>

          <button
            onclick="submitEvent()"
            class="px-6 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700"
          >
            Simpan Event
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>

    <script>
      const imageInput = document.getElementById("eventImage");

      const preview = document.getElementById("eventPreview");

      imageInput.addEventListener("change", function () {
        const file = this.files[0];

        if (!file) return;

        preview.src = URL.createObjectURL(file);

        preview.classList.remove("hidden");
      });
    </script>
  </body>
</html>
