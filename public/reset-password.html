<!doctype html>

<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Reset Password - Politalk</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <body class="bg-slate-100 min-h-screen">
    <!-- LOGO -->

    <div class="absolute top-8 left-10">
      <h1 class="text-4xl font-bold text-blue-600">POLITALK</h1>
    </div>

    <div class="min-h-screen flex items-center justify-center p-6">
      ```
      <div
        class="w-full max-w-5xl bg-white rounded-3xl overflow-hidden shadow-2xl flex"
      >
        <!-- LEFT -->
        <div
          class="hidden md:flex md:w-2/5 bg-blue-600 text-white p-10 flex-col justify-center"
        >
          <h1 class="text-5xl font-bold mb-5">Password Baru</h1>

          <p class="text-blue-100 leading-8">
            Gunakan password yang kuat agar akun Anda tetap aman dari akses yang
            tidak sah.
          </p>

          <div class="mt-10 text-7xl">🔒</div>
        </div>

        <!-- RIGHT -->
        <div class="w-full md:w-3/5 p-10">
          <h2 class="text-4xl font-bold text-slate-800">Reset Password</h2>

          <p class="text-slate-500 mt-2 mb-8">
            Buat password baru untuk akun Anda
          </p>

          <!-- PASSWORD BARU -->
          <div class="mb-5">
            <label class="block mb-2 font-medium text-slate-700">
              Password Baru
            </label>

            <div class="relative">
              <input
                id="passwordBaru"
                type="password"
                placeholder="Minimal 8 karakter"
                class="w-full border border-slate-300 rounded-xl px-4 py-3 pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500"
              />

              <button
                type="button"
                onclick="togglePassword('passwordBaru', 'eye1')"
                class="absolute right-4 top-1/2 -translate-y-1/2"
              >
                <span id="eye1">👁️</span>
              </button>
            </div>

            <p id="password-strength" class="mt-2 text-sm font-medium"></p>
          </div>

          <!-- KONFIRMASI -->
          <div class="mb-5">
            <label class="block mb-2 font-medium text-slate-700">
              Konfirmasi Password
            </label>

            <div class="relative">
              <input
                id="konfirmasiPassword"
                type="password"
                placeholder="Masukkan kembali password"
                class="w-full border border-slate-300 rounded-xl px-4 py-3 pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500"
              />

              <button
                type="button"
                onclick="togglePassword('konfirmasiPassword', 'eye2')"
                class="absolute right-4 top-1/2 -translate-y-1/2"
              >
                <span id="eye2">👁️</span>
              </button>
            </div>
          </div>

          <!-- BUTTON -->
          <button
            onclick="resetPassword()"
            class="w-full bg-blue-600 hover:bg-blue-700 hover:scale-[1.01] duration-200 text-white py-3 rounded-xl font-semibold shadow-lg"
          >
            Simpan Password Baru
          </button>

          <div class="text-center mt-6">
            <a
              href="index.html"
              class="text-blue-600 hover:text-blue-800 font-medium"
            >
              ← Kembali ke Login
            </a>
          </div>

          <div class="text-center mt-8">
            <p class="text-slate-400 text-sm">Politalk © 2026</p>
          </div>
        </div>
      </div>
      ```
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
      const passwordInput = document.getElementById("passwordBaru");

      const strength = document.getElementById("password-strength");

      passwordInput.addEventListener("input", () => {
        const value = passwordInput.value;

        if (value.length < 8) {
          strength.innerHTML = "🔴 Password Lemah";

          strength.className = "mt-2 text-sm font-medium text-red-500";
        } else if (value.length < 12) {
          strength.innerHTML = "🟡 Password Sedang";

          strength.className = "mt-2 text-sm font-medium text-yellow-500";
        } else {
          strength.innerHTML = "🟢 Password Kuat";

          strength.className = "mt-2 text-sm font-medium text-green-500";
        }
      });
    </script>

    <script src="script.js"></script>
  </body>
</html>
